<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <img src="imagens/TelaGrande.jpg" alt="" id="telagrande">
        <img src="imagens/TelaMedia.jpg" alt="" id="telamedia">

        <form action="" class="loginform">
            <h1 id="login">Login</h1>
            <br>
            <div class="inputgroup">
                <label for="usuario">Usuário:</label>
                <input type="text" class="iteminputgroup" id="usuario" required>
            </div>
            <br>
            <div class="inputgroup">
                <label for="senha">Senha:</label>
                <input type="password" class="iteminputgroup" id="senha" name="senha" required>
            </div>

            <button type="submit">Entrar</button>
        </form>

    </main>
</body>
</html>
